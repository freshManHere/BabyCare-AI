name: BabyCare
options:
  bundleIdPrefix: com.babycare
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""

targets:
  BabyCare:
    type: application
    platform: iOS
    sources:
      - path: BabyCare
        excludes:
          - "**/*.md"
    resources:
      - path: BabyCare/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.babycare.app
        INFOPLIST_FILE: BabyCare/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    scheme:
      testTargets:
        - BabyCareTests
        - BabyCareUITests

  BabyCareTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - BabyCareTests
    dependencies:
      - target: BabyCare
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.babycare.tests

  BabyCareUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - BabyCareUITests
    dependencies:
      - target: BabyCare
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.babycare.uitests
